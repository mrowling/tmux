set -g default-terminal 'screen-256color'

# reload config
unbind r
bind r source-file ~/.tmux.conf

set -g status-position top

# List plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'mrowling/dracula-tmux'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# Pomodoro config
set -g @pomodoro_interval_display " [%s/%s]"
set -g @pomodoro_granularity 'on'
set -g status-interval 1                       # Refresh the status line every second
set -g @pomodoro_on " 🍅 "
set -g @pomodoro_complete " ✔︎ "
set -g @pomodoro_pause " ⏸︎  "
set -g @pomodoro_prompt_break " ⏲︎ break? "
set -g @pomodoro_prompt_pomodoro " ⏱︎ start? "

# Dracula config
set -g @dracula-plugins "cwd custom:pomodoro.sh ram-usage cpu-usage time"
set -g @dracula-custom-plugin-colors "yellow dark_gray"
set -g @dracula-show-powerline true
set -g @dracula-show-empty-plugins false
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
