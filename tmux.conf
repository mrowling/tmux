set -g default-terminal 'screen-256color'

# reload config (auto-detects config location)
unbind r
bind r run-shell 'tmux source-file "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/tmux.conf"' \; display "Config reloaded!"

# tmux-hints-plugin config (must be set before plugin loads)
unbind h
# Optional: Customize settings
# set -g @hints-sidebar-key 'h'
# set -g @hints-sidebar-width '30'
# set -g @hints-path '~/hints/'
# set -g @hints-viewer 'cat'
# set -g @hints-extension 'txt'

set -g status-position top

# Pomodoro config (must be set before plugins load)
set -g @pomodoro_interval_display " [%s/%s]"
set -g @pomodoro_granularity 'on'
set -g status-interval 1                       # Refresh the status line every second
set -g @pomodoro_on " 🍅 "
set -g @pomodoro_complete " ✔︎ "
set -g @pomodoro_pause " ⏸︎  "
set -g @pomodoro_prompt_break " ⏲︎ break? "
set -g @pomodoro_prompt_pomodoro " ⏱︎ start? "

# Carelink config (must be set before plugins load)
# Set CARELINK_URL environment variable in your shell profile (e.g., ~/.bashrc, ~/.zshrc)
set -g @carelink-url "$CARELINK_URL"

# Dracula config (must be set before plugin loads)
set -g @dracula-plugins "carelink cwd pomodoro ram-usage cpu-usage time"
set -g @dracula-carelink-colors "pink dark_gray"
set -g @dracula-custom-plugin-colors "yellow dark_gray"
set -g @dracula-show-powerline true
set -g @dracula-show-empty-plugins false
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session

# List plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# Load local dev plugins (if TMUX_LOCAL_DEV is set) or TPM versions
run-shell '~/.config/tmux/scripts/load-dev-plugins.sh'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
